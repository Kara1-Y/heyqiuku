<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>嘿打瓦甜双么？</title>
    <style>
        .video-box {
            display: flex;
            gap: 10px;
            margin: 20px;
        }
        video {
            width: 48%;
            border: 1px solid #ccc;
        }
        .action-bar {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            margin-left: 20px;
        }
        .action-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            border: none;
            border-radius: 20px;
            background: #f5f5f5;
            cursor: pointer;
            font-size: 14px;
        }
        .action-btn.active {
            color: #ff4444;
            background: #ffeaea;
        }
    </style>
</head>
<body>

    <img src="./wa.png" />

    <h3>两个视频同时播放</h3>
    <div class="video-box">
        <video controls playsinline x5-video-player-type="h5-page">
            <source src="./2.mp4" type="video/mp4">
        </video>
        <video controls playsinline x5-video-player-type="h5-page">
            <source src="./3.mp4" type="video/mp4">
        </video>
    </div>

    <!-- 点赞收藏转发按钮 -->
    <div class="action-bar">
        <button class="action-btn" id="likeBtn">
            ❤️ <span class="count" id="likeCount">0</span>
        </button>
        <button class="action-btn" id="collectBtn">
            ⭐ <span class="count" id="collectCount">0</span>
        </button>
        <button class="action-btn" id="shareBtn">
            🔗 转发
        </button>
    </div>

    <!-- 单独引入外部 JS 文件 -->
    <script src="./交互.js"></script>
</body>
</html>
